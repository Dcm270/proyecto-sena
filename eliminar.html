<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Empleado</title>
  {% include 'bootstrap.html' %}
</head>
<body class="page-gradient">
  {% include 'menu.html' %}
  <div class="container mt-5">
    <div class="card-form">
      <h1 class="mb-4">Eliminar Empleado</h1>
      {% if mensaje %}
        <div class="alert alert-info">{{ mensaje }}</div>
      {% endif %}
      <form action="{{ url_for('eliminar') }}" method="POST" class="row g-2 mb-4">
        <div class="col-auto">
          <input type="number" class="form-control" name="id" placeholder="ID del empleado" required>
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-danger">Eliminar</button>
        </div>
      </form>
      <table class="table table-striped">
        <thead class="table-dark">
          <tr><th>ID</th><th>Identificacion</th><th>Nombre</th><th>Apellido</th></tr>
        </thead>
        <tbody>
          {% for e in empleados %}
          <tr>
            <td>{{ e['id'] }}</td><td>{{ e['identificacion'] }}</td>
            <td>{{ e['nombre'] }}</td><td>{{ e['apellido'] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
